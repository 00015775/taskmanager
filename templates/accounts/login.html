{% extends 'base.html' %}
{% block title %}Login — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4"><i class="fas fa-sign-in-alt me-2"></i>Login</h3>
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            <input type="{{ field.field.widget.input_type }}"
                                   name="{{ field.html_name }}"
                                   class="form-control {% if field.errors %}is-invalid{% endif %}">
                            {% for error in field.errors %}
                                <div class="invalid-feedback">{{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-dark w-100 mt-2">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">Don't have an account? <a href="/accounts/register/">Register</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
