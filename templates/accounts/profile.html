{% extends 'base.html' %}
{% block title %}Profile — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4"><i class="fas fa-user-circle me-2"></i>My Profile</h3>
                <p class="text-muted">Logged in as <strong>{{ user.username }}</strong> — {{ user.email }}</p>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Bio</label>
                        <textarea name="bio" class="form-control" rows="3">{{ form.instance.bio }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Avatar</label>
                        <input type="file" name="avatar" class="form-control">
                    </div>
                    <button type="submit" class="btn btn-dark">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
