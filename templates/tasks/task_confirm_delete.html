{% extends 'base.html' %}
{% block title %}Delete Task — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4 text-center">
                <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
                <h4>Delete Task?</h4>
                <p class="text-muted">Are you sure you want to delete <strong>"{{ task.title }}"</strong>? This cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                    <a href="/tasks/{{ task.pk }}/" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
