{% extends 'base.html' %}
{% block title %}{{ action }} Task — TaskManager{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">
                    <i class="fas fa-{% if action == 'Create' %}plus{% else %}edit{% endif %} me-2"></i>{{ action }} Task
                </h3>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Title</label>
                        <input type="text" name="title" class="form-control"
                               value="{% if form.instance.title %}{{ form.instance.title }}{% endif %}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea name="description" class="form-control" rows="4">{% if form.instance.description %}{{ form.instance.description }}{% endif %}</textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Priority</label>
                            <select name="priority" class="form-select">
                                <option value="low" {% if form.instance.priority == 'low' %}selected{% endif %}>Low</option>
                                <option value="medium" {% if form.instance.priority == 'medium' or not form.instance.pk %}selected{% endif %}>Medium</option>
                                <option value="high" {% if form.instance.priority == 'high' %}selected{% endif %}>High</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Status</label>
                            <select name="status" class="form-select">
                                <option value="todo" {% if form.instance.status == 'todo' or not form.instance.pk %}selected{% endif %}>To Do</option>
                                <option value="in_progress" {% if form.instance.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                                <option value="done" {% if form.instance.status == 'done' %}selected{% endif %}>Done</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Due Date</label>
                            <input type="date" name="due_date" class="form-control"
                                   value="{% if form.instance.due_date %}{{ form.instance.due_date|date:'Y-m-d' }}{% endif %}">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Tags</label>
                        <div class="d-flex flex-wrap gap-2">
                            {% for tag in form.fields.tags.queryset %}
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="tags"
                                       value="{{ tag.id }}" id="tag_{{ tag.id }}"
                                       {% if tag in form.instance.tags.all %}checked{% endif %}>
                                <label class="form-check-label" for="tag_{{ tag.id }}">
                                    <span class="badge rounded-pill" style="background-color: {{ tag.color }}">{{ tag.name }}</span>
                                </label>
                            </div>
                            {% empty %}
                            <p class="text-muted small">No tags yet. <a href="/tasks/tags/">Create some tags first</a>.</p>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">{{ action }} Task</button>
                        <a href="/tasks/" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
