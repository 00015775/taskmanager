# version: '3.9'

services:

  db:
    image: postgres:15-alpine
    container_name: taskmanager_db_dev
    environment:
      POSTGRES_DB: taskmanager_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - taskmanager_dev_network

  web:
    build:
      context: .
      target: production
    container_name: taskmanager_web_dev
    environment:
      DJANGO_SETTINGS_MODULE: taskmanager.settings.production
      SECRET_KEY: dev-secret-key-not-for-production
      POSTGRES_DB: taskmanager_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1
    volumes:
      - static_files_dev:/app/staticfiles
      - media_files_dev:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - taskmanager_dev_network

volumes:
  postgres_data_dev:
  static_files_dev:
  media_files_dev:

networks:
  taskmanager_dev_network:
    driver: bridge


